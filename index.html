
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asistente de Salud Senior - Fisiosilver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              'brand-blue': '#005A9C',
              'brand-lightblue': '#E6F0F8',
              'brand-bg': '#F7FAFC',
              'brand-green': '#2E7D32',
              'brand-soft-green': '#E8F5E9',
              'brand-yellow': '#FFC107',
              'brand-soft-yellow': '#FFFDE7',
              'brand-red': '#D32F2F',
              'brand-soft-red': '#FFEBEE',
              'brand-gray': {
                50: '#F9FAFB',
                100: '#F3F4F6',
                200: '#E5E7EB',
                300: '#D1D5DB',
                400: '#9CA3AF',
                500: '#6B7280',
                600: '#4B5563',
                700: '#374151',
                800: '#1F2937',
                900: '#111827',
              },
            },
            borderRadius: {
              'v-large': '2rem',
              'v-xl': '2.5rem',
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 90, 156, 0.05), 0 2px 10px -2px rgba(0, 0, 0, 0.02)',
              'soft-lg': '0 10px 40px -4px rgba(0, 90, 156, 0.08), 0 4px 15px -4px rgba(0, 0, 0, 0.04)',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #F7FAFC;
        -webkit-font-smoothing: antialiased;
      }
      .bento-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
      }
      .bento-item-large {
        grid-column: span 2;
      }
      @media (min-width: 640px) {
        .bento-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>

}
